<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compteur Yams 🎲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        ::-webkit-scrollbar { height: 6px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; text-align: center; }
        /* Prevents iOS Safari from zooming in when tapping inputs */
        input, select { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-30 shadow-lg">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-500">
                    TABLEAU DES SCORES YAMS 🎲
                </h1>
                <p class="text-xs text-slate-400 mt-1">Les scores et classements sont sauvegardés dans le cache.</p>
            </div>
            
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-1 md:pb-0 items-center">
                <div class="relative flex-shrink-0">
                    <select id="newPlayerAvatar" class="bg-slate-800 border border-slate-700 rounded-lg pl-2 pr-1 py-2 text-xl focus:outline-none focus:border-violet-500 cursor-pointer h-full">
                        <option value="🍄">🍄</option>
                        <option value="🌶️">🌶️</option>
                        <option value="🚀">🚀</option>
                        <option value="💣">💣</option>
                        <option value="🦖">🦖</option>
                        <option value="👽">👽</option>
                        <option value="💩">💩</option>
                        <option value="👻">👻</option>
                        <option value="🦄">🦄</option>
                        <option value="🌭">🌭</option>
                        <option value="🍺">🍺</option>
                        <option value="🐱">🐱</option>
                        <option value="🐸">🐸</option>
                        <option value="👑">👑</option>
                    </select>
                </div>
                
                <input id="newPlayerName" type="text" placeholder="Nom" 
                       class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-violet-500 flex-grow md:flex-grow-0 w-24 md:w-32">
                <button onclick="addPlayer()" 
                        class="bg-violet-600 hover:bg-violet-700 text-white text-sm font-bold px-4 py-2 rounded-lg transition-all active:scale-95 whitespace-nowrap">
                    + Ajout
                </button>
                <button onclick="resetGame()" 
                        class="bg-rose-600/20 hover:bg-rose-600/30 text-rose-400 border border-rose-500/30 text-sm font-bold px-3 py-2 rounded-lg transition-all whitespace-nowrap">
                    Effacer
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-6xl w-full mx-auto flex flex-col gap-6">
        
        <div id="leaderboardContainer" class="bg-slate-900 rounded-2xl border border-slate-800 shadow-xl p-4 md:p-6 hidden transition-all">
            <div class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h2 class="text-xl md:text-2xl font-black text-violet-400">🏆 CLASSEMENT DU JOUR</h2>
                    <p class="text-xs text-slate-400 mt-1">Découvrez qui est le vrai gagnant de toutes les parties d'aujourd'hui.</p>
                </div>
                <div class="flex flex-wrap gap-2 w-full md:w-auto">
                    <button onclick="toggleHistory()" class="bg-indigo-600/20 hover:bg-indigo-600/30 text-indigo-400 border border-indigo-500/30 text-xs md:text-sm font-bold px-4 py-2 rounded-lg transition-all whitespace-nowrap flex-grow md:flex-grow-0">
                        👁️ Historique
                    </button>
                    <button onclick="copyLeaderboard()" class="bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-400 border border-emerald-500/30 text-xs md:text-sm font-bold px-4 py-2 rounded-lg transition-all whitespace-nowrap flex-grow md:flex-grow-0">
                        📋 Partager
                    </button>
                    <button onclick="resetLeaderboard()" class="bg-rose-600/20 hover:bg-rose-600/30 text-rose-400 border border-rose-500/30 text-xs md:text-sm font-bold px-3 py-2 rounded-lg transition-all whitespace-nowrap flex-grow md:flex-grow-0">
                        🗑️ Effacer
                    </button>
                </div>
            </div>
            
            <div id="leaderboardSection" class="w-full"></div>
            
            <div id="historySection" class="w-full mt-6 hidden border-t border-slate-800 pt-4"></div>
        </div>

        <div class="bg-slate-900 rounded-2xl border border-slate-800 shadow-xl overflow-x-auto w-full">
            <table class="w-full text-left border-collapse min-w-max">
                <thead>
                    <tr class="bg-slate-800 border-b border-slate-700" id="tableHeader"></tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-800/50"></tbody>
            </table>
        </div>
        
        <div class="flex justify-end mt-2 mb-8">
            <button onclick="saveMatch()" class="bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 text-white text-base md:text-lg font-black px-8 py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-violet-900/40 whitespace-nowrap w-full md:w-auto">
                🏁 Terminer & Sauvegarder la partie
            </button>
        </div>
        
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 p-4 text-center text-xs text-slate-500 mt-auto">
        Conçu pour des soirées dés épiques. Cliquez dans la colonne d'un joueur pour surligner son tour.
    </footer>

    <script>
        const categories = [
            { id: '1s', name: 'Les 1 ⚀', type: 'upper', max: 5, multiple: 1 },
            { id: '2s', name: 'Les 2 ⚁', type: 'upper', max: 10, multiple: 2 },
            { id: '3s', name: 'Les 3 ⚂', type: 'upper', max: 15, multiple: 3 },
            { id: '4s', name: 'Les 4 ⚃', type: 'upper', max: 20, multiple: 4 },
            { id: '5s', name: 'Les 5 ⚄', type: 'upper', max: 25, multiple: 5 },
            { id: '6s', name: 'Les 6 ⚅', type: 'upper', max: 30, multiple: 6 },
            { id: 'upperBonus', name: 'Bonus (+35 si ≥ 63)', type: 'system-upper' },
            { id: 'subtotal', name: 'Total Supérieur', type: 'system-upper' },
            { id: '3kind', name: 'Brelan', type: 'lower', max: 30 },
            { id: '4kind', name: 'Carré', type: 'lower', max: 30 },
            { id: 'fullHouse', name: 'Full (max 30)', type: 'lower', max: 30 },
            { id: 'smStraight', name: 'Petite Suite (30)', type: 'lower', fixed: 30 },
            { id: 'lgStraight', name: 'Grande Suite (40)', type: 'lower', fixed: 40 },
            { id: 'yams', name: 'Yams (50)', type: 'lower', fixed: 50 },
            { id: 'chance', name: 'Chance', type: 'lower', max: 30 },
            { id: 'grandTotal', name: 'TOTAL GÉNÉRAL 👑', type: 'system-total' }
        ];

        // SAFE LOCAL STORAGE INITIALIZATION FOR IOS
        let gameState = {
            players: ['Pouline', 'Obus'],
            scores: { 'Pouline': {}, 'Obus': {} },
            avatars: { 'Pouline': '🦄', 'Obus': '🚀' }
        };
        let leaderboard = [];

        try {
            let savedState = localStorage.getItem('yams_party_state');
            if (savedState) {
                gameState = JSON.parse(savedState);
                if (!gameState.avatars) {
                    gameState.avatars = {};
                    gameState.players.forEach(p => gameState.avatars[p] = '🎲');
                }
            }
            
            let savedLeaderboard = localStorage.getItem('yams_daily_leaderboard');
            if (savedLeaderboard) {
                leaderboard = JSON.parse(savedLeaderboard);
            }
        } catch (e) {
            console.warn("Safari LocalStorage issue caught: ", e);
        }

        let activePlayer = null;

        function playMarioVibration() {
            if ("vibrate" in navigator) {
                navigator.vibrate([125, 75, 125, 275, 200, 275, 125, 75, 125, 275, 200, 600, 200]);
            }
        }

        function saveToCache() {
            try {
                localStorage.setItem('yams_party_state', JSON.stringify(gameState));
            } catch (e) { console.warn("Could not save to cache"); }
        }

        function toggleActivePlayer(player) {
            if (activePlayer === player) setActivePlayer(null);
            else setActivePlayer(player);
        }

        function setActivePlayer(player) {
            if (activePlayer === player && player !== null) return;
            activePlayer = player;
            
            document.querySelectorAll('th[data-player], td[data-player]').forEach(el => {
                el.classList.remove('bg-violet-900/40', 'bg-violet-900/20', 'bg-violet-900/10');
            });
            document.querySelectorAll('span[data-player-name]').forEach(el => {
                el.classList.remove('underline', 'decoration-2', 'underline-offset-4', 'text-violet-400');
                if (!el.classList.contains('text-amber-400')) el.classList.add('text-slate-100');
            });

            if (!player) return;

            document.querySelectorAll(`th[data-player="${player}"]`).forEach(el => el.classList.add('bg-violet-900/40'));
            document.querySelectorAll(`td[data-player="${player}"]`).forEach(el => {
                if (el.classList.contains('system-row')) el.classList.add('bg-violet-900/20');
                else el.classList.add('bg-violet-900/10');
            });
            document.querySelectorAll(`span[data-player-name="${player}"]`).forEach(el => {
                el.classList.add('underline', 'decoration-2', 'underline-offset-4');
                if (!el.classList.contains('text-amber-400')) {
                    el.classList.add('text-violet-400');
                    el.classList.remove('text-slate-100');
                }
            });
        }

        function addPlayer() {
            const input = document.getElementById('newPlayerName');
            const avatarInput = document.getElementById('newPlayerAvatar');
            const name = input.value.trim();
            const avatar = avatarInput.value;
            
            if (!name) return;
            if (gameState.players.includes(name)) return alert("Ce joueur existe déjà !");
            
            gameState.players.push(name);
            gameState.scores[name] = {};
            gameState.avatars[name] = avatar;
            
            input.value = '';
            
            const options = avatarInput.options;
            avatarInput.selectedIndex = Math.floor(Math.random() * options.length);

            saveToCache();
            renderTable();
        }

        function removePlayer(player) {
            if (confirm(`Êtes-vous sûr de vouloir retirer ${player} ?`)) {
                gameState.players = gameState.players.filter(p => p !== player);
                delete gameState.scores[player];
                delete gameState.avatars[player];
                if (activePlayer === player) activePlayer = null;
                saveToCache();
                renderTable();
            }
        }

        function resetGame() {
            if (confirm("Êtes-vous sûr de vouloir effacer le tableau actuel ? (Cela n'affecte pas le classement)")) {
                gameState.players.forEach(p => gameState.scores[p] = {});
                activePlayer = null;
                saveToCache();
                renderTable();
            }
        }

        function resetLeaderboard() {
            if (confirm("Êtes-vous sûr de vouloir réinitialiser le classement d'aujourd'hui ?")) {
                leaderboard = [];
                try { localStorage.removeItem('yams_daily_leaderboard'); } catch(e){}
                renderLeaderboard();
            }
        }

        function getPlayerAvatar(playerName, matches = []) {
            if (gameState.avatars[playerName]) return gameState.avatars[playerName];
            for (let m of matches) {
                if (m.avatars && m.avatars[playerName]) return m.avatars[playerName];
            }
            return '🎲';
        }

        function copyLeaderboard() {
            let today = new Date().toLocaleDateString();
            let todaysMatches = leaderboard.filter(m => m.date === today);
            
            if(todaysMatches.length === 0) {
                alert("Aucun classement à partager pour le moment !");
                return;
            }

            let stats = {};
            todaysMatches.forEach(m => {
                if(m.winner) {
                    if(!stats[m.winner]) stats[m.winner] = { wins: 0, totalPoints: 0 };
                    stats[m.winner].wins += 1;
                }
                Object.keys(m.scores).forEach(p => {
                    if(!stats[p]) stats[p] = { wins: 0, totalPoints: 0 };
                    stats[p].totalPoints += m.scores[p];
                });
            });

            let sortedPlayers = Object.keys(stats).sort((a,b) => {
                if (stats[b].wins !== stats[a].wins) return stats[b].wins - stats[a].wins;
                return stats[b].totalPoints - stats[a].totalPoints;
            });

            let results = "🏆 CLASSEMENT YAMS DU JOUR 🏆\n\n";
            sortedPlayers.forEach((p, index) => {
                let isTop = index === 0 && stats[p].wins > 0 ? "👑" : "▪️";
                let ava = getPlayerAvatar(p, todaysMatches);
                results += `${isTop} ${ava} ${p} : ${stats[p].wins} Victoire(s) | ${stats[p].totalPoints} Pts\n`;
            });

            navigator.clipboard.writeText(results).then(() => {
                alert("Classement copié dans le presse-papiers ! 📋");
            }).catch(() => alert("Impossible de copier les résultats automatiquement."));
        }

        function toggleHistory() {
            const section = document.getElementById('historySection');
            section.classList.toggle('hidden');
        }

        function renderHistory(todaysMatches) {
            const section = document.getElementById('historySection');
            if (todaysMatches.length === 0) {
                section.innerHTML = '';
                return;
            }
            
            let html = `<h3 class="text-base font-bold text-slate-300 mb-3">Détail des parties</h3><div class="flex flex-col gap-2">`;
            
            todaysMatches.forEach((m, index) => {
                let scoresHtml = Object.entries(m.scores)
                    .sort((a, b) => b[1] - a[1]) // Tri par score décroissant
                    .map(([p, s]) => {
                        let ava = m.avatars && m.avatars[p] ? m.avatars[p] : '🎲';
                        let isWinner = p === m.winner;
                        return `<span class="text-sm ${isWinner ? 'text-amber-400 font-bold' : 'text-slate-400'}">${ava} ${p}: ${s}</span>`;
                    })
                    .join('<span class="text-slate-600 mx-2">|</span>');
                    
                html += `
                <div class="bg-slate-800/40 rounded-lg p-3 border border-slate-700/50 flex flex-col md:flex-row md:items-center justify-between gap-2">
                    <div class="text-sm font-bold text-violet-400 whitespace-nowrap">
                        Partie ${index + 1} 
                        <span class="text-xs text-slate-500 font-normal ml-2">${m.time || ''}</span>
                    </div>
                    <div class="flex flex-wrap items-center">${scoresHtml}</div>
                </div>`;
            });
            
            html += `</div>`;
            section.innerHTML = html;
        }

        function updateScore(player, categoryId, inputElement) {
            let value = inputElement.value;
            let parsedVal = parseInt(value);
            const cat = categories.find(c => c.id === categoryId);

            if (value === '' || isNaN(parsedVal) || parsedVal < 0) {
                delete gameState.scores[player][categoryId];
            } else {
                if (cat.multiple && parsedVal % cat.multiple !== 0) {
                    parsedVal = Math.round(parsedVal / cat.multiple) * cat.multiple;
                }
                if (cat.max && parsedVal > cat.max) parsedVal = cat.max;
                gameState.scores[player][categoryId] = parsedVal;
            }

            inputElement.value = gameState.scores[player][categoryId] !== undefined ? gameState.scores[player][categoryId] : '';
            saveToCache();
            calculateTotals();
        }

        function toggleScratch(player, categoryId) {
            activePlayer = player;
            if (gameState.scores[player][categoryId] === 0) delete gameState.scores[player][categoryId];
            else gameState.scores[player][categoryId] = 0;
            saveToCache();
            renderTable(); 
        }

        function toggleFixedScore(player, categoryId, catFixed) {
            activePlayer = player;
            let current = gameState.scores[player][categoryId];
            if (current === undefined) {
                gameState.scores[player][categoryId] = catFixed;
                if (categoryId === 'yams' && catFixed === 50 && typeof confetti === 'function') {
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#a78bfa', '#ec4899', '#34d399', '#fbbf24'] });
                }
            } else if (current === catFixed) {
                gameState.scores[player][categoryId] = 0;
            } else {
                delete gameState.scores[player][categoryId];
            }
            saveToCache();
            renderTable();
        }

        function calculateTotals() {
            let leadingPlayer = '';
            let highestScore = -1;

            gameState.players.forEach(player => {
                let upperSum = 0;
                categories.filter(c => c.type === 'upper').forEach(c => upperSum += (gameState.scores[player][c.id] || 0));
                const bonus = upperSum >= 63 ? 35 : 0;
                document.getElementById(`calc-${player}-upperBonus`).innerText = bonus ? `+${bonus}` : '0';

                let lowerSum = 0;
                categories.filter(c => c.type === 'lower').forEach(c => lowerSum += (gameState.scores[player][c.id] || 0));

                const grandTotal = upperSum + bonus + lowerSum;
                document.getElementById(`calc-${player}-subtotal`).innerText = upperSum;
                document.getElementById(`calc-${player}-grandTotal`).innerText = grandTotal;

                if (grandTotal > highestScore && grandTotal > 0) {
                    highestScore = grandTotal;
                    leadingPlayer = player;
                }
            });

            gameState.players.forEach(player => {
                const headerText = document.getElementById(`header-text-${player}`);
                if (headerText) {
                    headerText.classList.remove('text-amber-400', 'text-slate-100', 'text-violet-400');
                    if (player === leadingPlayer && highestScore > 0) {
                        headerText.classList.add('text-amber-400');
                        headerText.innerHTML = `👑 ${player}`;
                    } else {
                        if (player === activePlayer) headerText.classList.add('text-violet-400');
                        else headerText.classList.add('text-slate-100');
                        headerText.innerHTML = player;
                    }
                }
            });
        }

        function renderTable() {
            const header = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');

            header.innerHTML = `<th class="p-3 md:p-4 text-slate-300 uppercase tracking-wider text-xs md:text-sm font-bold sticky left-0 bg-slate-800 z-20 shadow-[2px_0_5px_rgba(0,0,0,0.1)] w-32 md:w-48">Catégories</th>`;
            gameState.players.forEach(player => {
                let isAct = player === activePlayer;
                let thBg = isAct ? 'bg-violet-900/40' : '';
                let textCol = isAct ? 'text-violet-400 underline decoration-2 underline-offset-4' : 'text-slate-100';
                let ava = gameState.avatars[player] || '🎲';
                
                header.innerHTML += `
                <th data-player="${player}" class="p-3 md:p-4 font-extrabold text-center text-sm md:text-base tracking-wide min-w-[140px] ${thBg} transition-colors">
                    <div class="flex flex-col items-center justify-center gap-1">
                        <div class="text-2xl mb-1">${ava}</div>
                        <div class="flex items-center gap-2">
                            <span data-player-name="${player}" onclick="toggleActivePlayer('${player}')" 
                                  class="cursor-pointer transition-all hover:text-violet-300 ${textCol}" 
                                  id="header-text-${player}" title="Cliquez pour suivre le tour">${player}</span>
                            <button onclick="removePlayer('${player}')" title="Retirer le joueur"
                                    class="text-rose-500 bg-rose-500/10 hover:bg-rose-500/20 rounded-full w-5 h-5 flex items-center justify-center text-[10px] transition-colors">✕</button>
                        </div>
                    </div>
                </th>`;
            });

            body.innerHTML = '';
            categories.forEach(cat => {
                let rowHtml = '';
                if (cat.type.startsWith('system-')) {
                    rowHtml += `<tr class="bg-slate-900/80 font-semibold text-slate-300">
                        <td class="p-3 md:p-4 md:pl-6 text-xs md:text-sm italic sticky left-0 bg-slate-850 z-10 shadow-[2px_0_5px_rgba(0,0,0,0.1)]">${cat.name}</td>`;
                    gameState.players.forEach(player => {
                        let tdBg = player === activePlayer ? 'bg-violet-900/20' : '';
                        rowHtml += `<td data-player="${player}" id="calc-${player}-${cat.id}" class="system-row p-3 md:p-4 text-center text-base md:text-lg font-bold ${tdBg} transition-colors ${cat.id === 'grandTotal' ? 'text-xl md:text-2xl text-violet-400 font-black' : ''}">0</td>`;
                    });
                } else {
                    rowHtml += `<tr class="hover:bg-slate-900/50 transition-colors">
                        <td class="p-3 md:p-4 md:pl-6 text-xs md:text-sm font-medium text-slate-400 sticky left-0 bg-slate-900 z-10 shadow-[2px_0_5px_rgba(0,0,0,0.1)]">${cat.name}</td>`;
                    
                    gameState.players.forEach(player => {
                        let tdBg = player === activePlayer ? 'bg-violet-900/10' : '';
                        const val = gameState.scores[player][cat.id];
                        
                        if (cat.fixed) {
                            let displayVal = '';
                            let btnStyle = 'bg-slate-800/50 hover:bg-slate-700 text-slate-100';
                            if (val === cat.fixed) {
                                displayVal = `✅ ${cat.fixed}`;
                                btnStyle = 'bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-400 border border-emerald-500/50';
                            } else if (val === 0) {
                                displayVal = '❌ Rayé';
                                btnStyle = 'bg-rose-900/20 text-rose-400 border border-rose-500/30 line-through decoration-2';
                            }
                            rowHtml += `<td data-player="${player}" class="p-2 ${tdBg} transition-colors">
                                <button onclick="toggleFixedScore('${player}', '${cat.id}', ${cat.fixed})"
                                        onfocus="setActivePlayer('${player}')"
                                        class="w-full ${btnStyle} text-center py-2 md:py-3 rounded-lg md:rounded-xl border border-transparent transition-all font-bold text-sm md:text-base min-h-[42px] md:min-h-[50px]">
                                    ${displayVal}
                                </button>
                            </td>`;
                        } else {
                            let valDisplay = val !== undefined ? val : '';
                            let maxInput = cat.max || 100;
                            let stepInput = cat.multiple || 1;
                            let isScratched = val === 0;
                            let inputStyle = isScratched 
                                ? 'bg-rose-900/20 border-rose-500/30 text-rose-400 line-through decoration-2' 
                                : 'bg-slate-800/50 hover:bg-slate-800 focus:bg-slate-700 text-slate-100 border-slate-700/50';
                            let scratchBtnStyle = isScratched
                                ? 'bg-rose-600/20 border-rose-500/50 text-rose-400'
                                : 'bg-slate-800/50 border-slate-700/50 text-slate-500 hover:text-rose-400 hover:bg-slate-700';

                            rowHtml += `<td data-player="${player}" class="p-2 ${tdBg} transition-colors">
                                <div class="flex items-center gap-1">
                                    <input id="input-${player}-${cat.id}" type="number" pattern="[0-9]*" inputmode="numeric" min="0" max="${maxInput}" step="${stepInput}"
                                           value="${valDisplay}"
                                           onfocus="setActivePlayer('${player}')"
                                           onblur="updateScore('${player}', '${cat.id}', this)"
                                           onkeydown="if(event.key === 'Enter') updateScore('${player}', '${cat.id}', this)"
                                           class="w-full ${inputStyle} text-center py-2 md:py-3 rounded-lg md:rounded-xl border focus:border-violet-500 focus:outline-none transition-all font-bold text-base md:text-lg">
                                    <button onclick="toggleScratch('${player}', '${cat.id}')"
                                            onfocus="setActivePlayer('${player}')"
                                            title="Rayer (Score 0)"
                                            class="flex-shrink-0 w-8 md:w-10 h-[42px] md:h-[50px] rounded-lg md:rounded-xl border transition-all flex items-center justify-center ${scratchBtnStyle}">
                                        ✕
                                    </button>
                                </div>
                            </td>`;
                        }
                    });
                }
                rowHtml += `</tr>`;
                body.innerHTML += rowHtml;
            });

            if (!document.getElementById('sticky-style')) {
                const style = document.createElement('style');
                style.id = 'sticky-style';
                style.appendChild(document.createTextNode('.bg-slate-850 { background-color: #151e2e; }'));
                document.head.appendChild(style);
            }

            gameState.players.forEach(player => {
                categories.forEach(cat => {
                    if (!cat.fixed && !cat.type.startsWith('system-')) {
                        const el = document.getElementById(`input-${player}-${cat.id}`);
                        if (el) {
                            const val = gameState.scores[player][cat.id];
                            el.value = val !== undefined ? val : '';
                        }
                    }
                });
            });

            calculateTotals();
        }

        function saveMatch() {
            if (!confirm("Avez-vous terminé cette partie ? Cela sauvegardera les résultats dans le classement et effacera le tableau.")) return;
            
            let now = new Date();
            let today = now.toLocaleDateString();
            let timeStr = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            let matchData = { 
                date: today, 
                time: timeStr, 
                scores: {}, 
                avatars: JSON.parse(JSON.stringify(gameState.avatars)) 
            };
            let winner = null;
            let highest = -1;

            gameState.players.forEach(p => {
                let total = parseInt(document.getElementById(`calc-${p}-grandTotal`).innerText) || 0;
                matchData.scores[p] = total;
                if (total > highest && total > 0) { 
                    highest = total; 
                    winner = p; 
                }
            });
            
            if (highest === -1) return alert("Le tableau est vide ! Ajoutez quelques scores avant de sauvegarder.");

            matchData.winner = winner;
            leaderboard.push(matchData);
            try { localStorage.setItem('yams_daily_leaderboard', JSON.stringify(leaderboard)); } catch(e){}
            
            gameState.players.forEach(player => gameState.scores[player] = {});
            activePlayer = null;
            saveToCache();
            renderTable();
            renderLeaderboard();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderLeaderboard() {
            let today = new Date().toLocaleDateString();
            let todaysMatches = leaderboard.filter(m => m.date === today);
            const container = document.getElementById('leaderboardContainer');
            const section = document.getElementById('leaderboardSection');
            
            if(todaysMatches.length === 0) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            let stats = {};
            todaysMatches.forEach(m => {
                if(m.winner) {
                    if(!stats[m.winner]) stats[m.winner] = { wins: 0, totalPoints: 0 };
                    stats[m.winner].wins += 1;
                }
                Object.keys(m.scores).forEach(p => {
                    if(!stats[p]) stats[p] = { wins: 0, totalPoints: 0 };
                    stats[p].totalPoints += m.scores[p];
                });
            });

            let sortedPlayers = Object.keys(stats).sort((a,b) => {
                if (stats[b].wins !== stats[a].wins) return stats[b].wins - stats[a].wins;
                return stats[b].totalPoints - stats[a].totalPoints;
            });

            let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
            sortedPlayers.forEach((p, index) => {
                let isTop = index === 0 && stats[p].wins > 0;
                let ava = getPlayerAvatar(p, todaysMatches);
                html += `
                <div onclick="playMarioVibration()" class="cursor-pointer hover:scale-[1.02] active:scale-95 transition-transform ${isTop ? 'bg-gradient-to-br from-violet-900/50 to-slate-800 border-violet-500/50' : 'bg-slate-800 border-slate-700'} rounded-xl p-4 border flex items-center gap-4">
                    <div class="text-3xl">${ava}</div>
                    <div class="flex-grow">
                        <div class="text-lg font-bold text-slate-100 flex items-center gap-2">
                            ${p} ${isTop ? '<span class="text-amber-400">👑</span>' : ''}
                        </div>
                        <div class="text-sm text-slate-400 flex gap-3 mt-1">
                            <span><strong class="text-violet-400">${stats[p].wins}</strong> Victoires</span>
                            <span><strong class="text-slate-300">${stats[p].totalPoints}</strong> Pts</span>
                        </div>
                    </div>
                </div>`;
            });
            html += `</div>`;
            section.innerHTML = html;
            
            renderHistory(todaysMatches);
        }

        renderTable();
        renderLeaderboard();
    </script>
</body>
</html>
